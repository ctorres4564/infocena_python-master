{% extends "base.html" %} 
{% block title %}Página Inicial - Shopping InfoCena{% endblock %}
{% block content %}
<div
  class="container d-flex align-items-center justify-content-center min-vh-100"
>
  <div
    class="card shadow-lg p-4"
    style="max-width: 450px; width: 100%; border-radius: 1rem"
  >
    <div class="text-center mb-4">
      <img
        src="https://img.icons8.com/color/96/000000/shopping-cart.png"
        alt="Logo"
        style="width: 64px; height: 64px"
      />
      <h1 class="display-6 mt-3 mb-1" style="font-weight: 700; color: #198754">
        Shopping InfoCena
      </h1>
      <p class="lead" style="color: #555">
        Sua plataforma de lojas de informática
      </p>
    </div>
    <hr />
    <div class="text-center mb-3">
      <a
        href="{% url 'cadastro:listar_lojas' %}"
        class="btn btn-success btn-lg w-100 py-3 shadow-sm"
        style="font-size: 1.2rem; font-weight: 600; border-radius: 0.5rem"
      >
        <i class="bi bi-shop me-2"></i> Gerenciar Lojas
      </a>
    </div>
    <div class="text-center mt-4">
      <p class="text-muted mb-0">
        <strong
          >Utilize o botão acima para navegar pelas funcionalidades.</strong
        >
      </p>
    </div>
  </div>
</div>
{% endblock %}
