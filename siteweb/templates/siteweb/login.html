{% extends 'siteweb/base_institucional.html' %} {% block title %}Login - Área
Administrativa{% endblock %} {% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-body">
        <h2 class="text-center mb-4">Login</h2>

        {% if form.errors %}
        <div class="alert alert-danger">
          Usuário ou senha inválidos. Por favor, tente novamente.
        </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_username" class="form-label">Usuário</label>
            <input
              type="text"
              name="username"
              id="id_username"
              class="form-control"
              required
            />
          </div>
          <div class="mb-3">
            <label for="id_password" class="form-label">Senha</label>
            <input
              type="password"
              name="password"
              id="id_password"
              class="form-control"
              required
            />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Entrar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
