<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Área Administrativa{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <nav
          id="sidebar"
          class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse"
        >
          <div class="position-sticky pt-3">
            <div class="text-center mb-4">
              <h5 class="text-light">Painel Administrativo</h5>
            </div>
            <ul class="nav flex-column">
              <li class="nav-item">
                <a class="nav-link text-light" href="{% url 'dashboard' %}">
                  <i class="bi bi-speedometer2"></i> Dashboard
                </a>
              </li>
              <li class="nav-item">
                <a
                  class="nav-link text-light"
                  href="{% url 'produtos_admin' %}"
                >
                  <i class="bi bi-box"></i> Produtos
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="{% url 'usuarios' %}">
                  <i class="bi bi-people"></i> Usuários
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="{% url 'relatorios' %}">
                  <i class="bi bi-graph-up"></i> Relatórios
                </a>
              </li>
              <li class="nav-item mt-4">
                <a class="nav-link text-light" href="{% url 'logout' %}">
                  <i class="bi bi-box-arrow-right"></i> Sair
                </a>
              </li>
            </ul>
          </div>
        </nav>

        <!-- Main content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
          <div
            class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom"
          >
            <h1 class="h2">{% block page_title %}{% endblock %}</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
              {% block actions %}{% endblock %}
            </div>
          </div>

          {% if messages %} {% for message in messages %}
          <div
            class="alert alert-{{ message.tags }} alert-dismissible fade show"
            role="alert"
          >
            {{ message }}
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="alert"
              aria-label="Close"
            ></button>
          </div>
          {% endfor %} {% endif %} {% block content %} {% endblock %}
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
